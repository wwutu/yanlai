; Unified gameplay tuning configuration entry.
; Future growth speed, animation timing, probabilities, debug parameters,
; and development parameters should live in config files instead of code.

[growth]
; Growth percent per second. 0.1 = ~16 min full growth. For testing: 5.0 for fast.
speed=0.3
efficiency=1.0

[assets]
; Asset source: "validation" or "production"
; Default is "validation" to maintain current project state.
; When "production" is selected, CatLayer attempts to load from production paths.
; Falls back to validation if production assets are unavailable.
source="validation"

[animation]
; Runtime production sprite playback speed.
; Keep low for desktop companion subtlety.
idle_fps=1.0

